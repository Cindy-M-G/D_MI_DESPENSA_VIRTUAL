<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Cliente</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f2f2f2;
}

header{
    background:linear-gradient(90deg,#005bea,#00c6fb);
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    font-size:32px;
}

.panel{

    width:95%;
    max-width:1200px;
    margin:30px auto;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;

}

.card{

    background:#f8f8f8;
    height:220px;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-decoration:none;
    color:#003366;

    transition:.3s;

}

.card:hover{

    background:#e6f7ff;
    transform:scale(1.03);

}

.icono{

    font-size:70px;
    margin-bottom:15px;

}

.titulo{

    font-size:18px;
    font-weight:bold;
    text-align:center;

}

@media(max-width:768px){

    .panel{
        grid-template-columns:repeat(2,1fr);
    }

}

@media(max-width:500px){

    .panel{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<header>
    <h1>Mi Despensa Virtual</h1>
</header>

<div class="panel">

    <a href="productos.html" class="card">
        <div class="icono">🛍️</div>
        <div class="titulo">PRODUCTOS</div>
    </a>

    <a href="carrito.html" class="card">
        <div class="icono">🛒</div>
        <div class="titulo">CARRITO</div>
    </a>

    <a href="pedidos.html" class="card">
        <div class="icono">📦</div>
        <div class="titulo">MIS PEDIDOS</div>
    </a>

    <a href="pago.html" class="card">
        <div class="icono">💳</div>
        <div class="titulo">PAGOS</div>
    </a>

    <a href="factura.html" class="card">
        <div class="icono">🧾</div>
        <div class="titulo">FACTURAS</div>
    </a>

    <a href="perfil.html" class="card">
        <div class="icono">👤</div>
        <div class="titulo">MI PERFIL</div>
    </a>

</div>

</body>
</html>
