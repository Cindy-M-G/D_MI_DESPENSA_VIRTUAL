<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mi Perfil | Mi Despensa Virtual</title>

    <link rel="stylesheet" href="../css/estilos.css">

    <style>

        .perfil-container{
            width:95%;
            max-width:700px;
            margin:30px auto;
        }

        .perfil-header{
            text-align:center;
            margin-bottom:30px;
        }

        .perfil-header h1{
            color:#2c3e50;
            margin-bottom:10px;
        }

        .perfil-header p{
            color:#7f8c8d;
        }

        .avatar{
            width:120px;
            height:120px;
            border-radius:50%;
            background:#3498db;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:45px;
            font-weight:bold;
            margin:0 auto 20px auto;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.15);
        }

        .acciones{
            display:flex;
            gap:15px;
            margin-top:25px;
        }

        .btn-guardar{
            flex:1;
            background:#27ae60;
            color:white;
            border:none;
            padding:12px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
        }

        .btn-cancelar{
            flex:1;
            background:#95a5a6;
            color:white;
            border:none;
            padding:12px;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
        }

        .btn-guardar:hover{
            background:#219150;
        }

        .btn-cancelar:hover{
            background:#7f8c8d;
        }

        #mensaje{
            margin-top:15px;
        }

    </style>

</head>

<body>

    <nav class="navbar">
        Mi Despensa Virtual
    </nav>

    <div class="perfil-container">

        <div class="perfil-header">

            <div class="avatar">
                M
            </div>

            <h1>Mi Perfil</h1>

            <p>Administre su información personal</p>

        </div>

        <div class="card">

            <form id="perfilForm">

                <label>Nombres</label>
                <input
                    type="text"
                    id="nombres"
                    value="Mirelly"
                    required>

                <label>Apellidos</label>
                <input
                    type="text"
                    id="apellidos"
                    value="Perez"
                    required>

                <label>Dirección</label>
                <textarea
                    id="direccion"
                    required>Quito - Ecuador</textarea>

                <label>Teléfono</label>
                <input
                    type="text"
                    id="telefono"
                    value="0999999999"
                    maxlength="10"
                    required>

                <label>Correo Electrónico</label>
                <input
                    type="email"
                    id="correo"
                    value="usuario@correo.com"
                    required>

                <label>Nueva Contraseña</label>
                <input
                    type="password"
                    id="clave"
                    placeholder="Dejar vacío si no desea cambiarla">

                <label>Confirmar Contraseña</label>
                <input
                    type="password"
                    id="confirmar"
                    placeholder="Repita la nueva contraseña">

                <div class="acciones">

                    <button
                        type="submit"
                        class="btn-guardar">

                        Guardar Cambios

                    </button>

                    <button
                        type="reset"
                        class="btn-cancelar">

                        Cancelar

                    </button>

                </div>

                <div id="mensaje"></div>

            </form>

        </div>

    </div>

    <script>

        const formulario =
            document.getElementById("perfilForm");

        const mensaje =
            document.getElementById("mensaje");

        formulario.addEventListener("submit", function(e){

            e.preventDefault();

            mensaje.className = "";
            mensaje.innerHTML = "";

            const telefono =
                document.getElementById("telefono").value.trim();

            const clave =
                document.getElementById("clave").value;

            const confirmar =
                document.getElementById("confirmar").value;

            const regexTelefono =
                /^[0-9]{10}$/;

            if(!regexTelefono.test(telefono)){

                mensaje.className = "error";

                mensaje.innerHTML =
                    "El teléfono debe contener 10 dígitos.";

                return;

            }

            if(clave !== ""){

                if(clave.length < 8){

                    mensaje.className = "error";

                    mensaje.innerHTML =
                        "La contraseña debe tener mínimo 8 caracteres.";

                    return;

                }

                if(clave !== confirmar){

                    mensaje.className = "error";

                    mensaje.innerHTML =
                        "Las contraseñas no coinciden.";

                    return;

                }

            }

            mensaje.className = "success";

            mensaje.innerHTML =
                "✅ Perfil actualizado correctamente.";

    
            // Enviar datos a Flask + Oracle

        });

    </script>

</body>

</html>
