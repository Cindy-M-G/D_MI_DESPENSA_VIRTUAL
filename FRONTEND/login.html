<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Mi Despensa Virtual</title>

    <link rel="stylesheet" href="../css/estilos.css">
</head>

<body>

    <nav class="navbar">
        Mi Despensa Virtual
    </nav>

    <div class="container">

        <div class="card">

            <h2>Iniciar Sesión</h2>

            <form id="loginForm">

                <label for="correo">Correo Electrónico</label>
                <input
                    type="email"
                    id="correo"
                    placeholder="Ingrese su correo"
                    required>

                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Ingrese su contraseña"
                    required>

                <div style="margin-top:10px;">
                    <input
                        type="checkbox"
                        id="mostrarPassword"
                        style="width:auto;">

                    <label
                        for="mostrarPassword"
                        style="display:inline;font-weight:normal;">
                        Mostrar contraseña
                    </label>
                </div>

                <button
                    type="submit"
                    class="btn">
                    Ingresar
                </button>

                <div id="mensaje"></div>

            </form>

            <div style="text-align:center; margin-top:20px;">

                <p>¿No tienes cuenta?</p>

                <a href="registro.html">
                    Registrarse
                </a>

            </div>

        </div>

    </div>

    <script>

        const formulario = document.getElementById("loginForm");

        const checkbox = document.getElementById("mostrarPassword");

        const password = document.getElementById("password");

        const mensaje = document.getElementById("mensaje");

        checkbox.addEventListener("change", () => {

            password.type =
                checkbox.checked
                ? "text"
                : "password";

        });

        formulario.addEventListener("submit", function (e) {

            e.preventDefault();

            mensaje.className = "";
            mensaje.innerHTML = "";

            const correo =
                document.getElementById("correo")
                .value
                .trim();

            const clave =
                document.getElementById("password")
                .value
                .trim();

            if (correo === "") {

                mensaje.className = "error";
                mensaje.innerHTML =
                    "Ingrese un correo electrónico.";

                return;
            }

            if (clave === "") {

                mensaje.className = "error";
                mensaje.innerHTML =
                    "Ingrese una contraseña.";

                return;
            }

            if (clave.length < 8) {

                mensaje.className = "error";
                mensaje.innerHTML =
                    "La contraseña debe tener al menos 8 caracteres.";

                return;
            }

            mensaje.className = "success";
            mensaje.innerHTML =
                "Inicio de sesión validado correctamente.";

            // Aquí luego conectaremos Flask
            // window.location.href = "productos.html";

        });

    </script>

</body>

</html>
