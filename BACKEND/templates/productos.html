<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Productos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:linear-gradient(135deg,#005bea,#00c6fb);
padding:20px;
color:white;
}

nav{
background:white;
padding:15px;
display:flex;
gap:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

nav a{
text-decoration:none;
color:#005bea;
font-weight:bold;
}

.container{
padding:30px;
}

table{
width:100%;
background:white;
border-collapse:collapse;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

th{
background:#005bea;
color:white;
padding:15px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f3f8ff;
}

.btn{
background:#005bea;
color:white;
padding:8px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>📦 Productos Disponibles</h1>
</header>

<nav>

<a href="/dashboard">Inicio</a>

<a href="/productos">Productos</a>

<a href="/carrito">Carrito</a>

<a href="/pedidos">Pedidos</a>

<a href="/">Cerrar Sesión</a>

</nav>

<div class="container">

<table>

<tr>

<th>Código</th>

<th>Producto</th>

<th>Stock</th>

<th>Precio</th>

<th>Acción</th>

</tr>

{% for p in productos %}

<tr>

<td>{{ p[0] }}</td>

<td>{{ p[1] }}</td>

<td>{{ p[2] }}</td>

<td>$ {{ p[3] }}</td>

<td>

<button class="btn">
Agregar al Carrito
</button>

</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
