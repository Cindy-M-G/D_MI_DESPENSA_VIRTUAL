<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Mi Despensa Virtual</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
}

header{
background:linear-gradient(135deg,#005bea,#00c6fb);
padding:20px;
color:white;
}

header h1{
font-size:28px;
}

nav{
background:white;
padding:15px;
display:flex;
gap:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

nav a{
text-decoration:none;
color:#005bea;
font-weight:bold;
}

.container{
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.1);
}

.card h3{
color:#005bea;
margin-bottom:10px;
}

.card p{
font-size:26px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<h1>🛒 Mi Despensa Virtual</h1>
</header>

<nav>

<a href="/dashboard">Inicio</a>

<a href="/productos">Productos</a>

<a href="/carrito">Carrito</a>

<a href="/pedidos">Pedidos</a>

<a href="/">Cerrar Sesión</a>

</nav>

<div class="container">

<div class="cards">

<div class="card">
<h3>Productos</h3>
<p>📦</p>
</div>

<div class="card">
<h3>Pedidos</h3>
<p>🧾</p>
</div>

<div class="card">
<h3>Facturas</h3>
<p>💳</p>
</div>

<div class="card">
<h3>Clientes</h3>
<p>👥</p>
</div>

</div>

</div>

</body>
</html>
